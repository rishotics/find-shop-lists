<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DukaanKhoj - Shop Finder for Indian Businesses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2332;
  --navy-light: #243044;
  --saffron: #E8A838;
  --saffron-glow: #F5C563;
  --terracotta: #C75B39;
  --cream: #FDF6EC;
  --cream-dark: #F0E6D4;
  --gold: #D4A843;
  --green: #3B8C5E;
  --green-light: #E8F5E9;
  --text: #2C2C2C;
  --text-light: #6B6B6B;
  --white: #FFFFFF;
  --border: #E0D5C5;
  --shadow: 0 4px 24px rgba(26,35,50,0.10);
  --shadow-lg: 0 12px 48px rgba(26,35,50,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', 'Noto Sans Devanagari', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* --- NOISE TEXTURE OVERLAY --- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* --- HEADER --- */
.header {
  background: var(--navy);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: var(--saffron);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transform: rotate(-3deg);
  box-shadow: 0 2px 8px rgba(232,168,56,0.4);
}

.logo-text {
  font-family: 'Libre Baskerville', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--cream);
  letter-spacing: -0.5px;
}

.logo-text span { color: var(--saffron); }

.logo-sub {
  font-size: 11px;
  color: #8899aa;
  font-weight: 400;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: -2px;
}

.lang-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--navy-light);
  border: 1px solid #3a4a5e;
  border-radius: 100px;
  padding: 6px 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-toggle:hover { border-color: var(--saffron); }

.lang-btn {
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  background: transparent;
  color: #8899aa;
}
.lang-btn.active {
  background: var(--saffron);
  color: var(--navy);
  box-shadow: 0 2px 8px rgba(232,168,56,0.3);
}

/* --- HERO SECTION --- */
.hero {
  background: linear-gradient(170deg, var(--navy) 0%, #2a3d56 55%, var(--terracotta) 100%);
  padding: 60px 24px 80px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(232,168,56,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 40px;
  background: var(--cream);
  clip-path: ellipse(55% 100% at 50% 100%);
}

.hero-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-family: 'Libre Baskerville', serif;
  font-size: clamp(28px, 5vw, 44px);
  color: var(--cream);
  line-height: 1.25;
  margin-bottom: 16px;
}

.hero h1 em {
  font-style: normal;
  color: var(--saffron);
  position: relative;
}

.hero h1 em::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--saffron);
  opacity: 0.4;
  border-radius: 2px;
}

.hero p {
  font-size: 17px;
  color: #b0c0d0;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

/* --- SEARCH CARD --- */
.search-section {
  max-width: 780px;
  margin: -44px auto 0;
  padding: 0 20px;
  position: relative;
  z-index: 10;
}

.search-card {
  background: var(--white);
  border-radius: 20px;
  padding: 36px 32px 32px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.search-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--terracotta), var(--saffron), var(--gold));
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field.full { grid-column: 1 / -1; }

.field label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.field label .req {
  color: var(--terracotta);
  font-size: 10px;
}

.field input,
.field textarea {
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: var(--cream);
  transition: all 0.2s;
  outline: none;
}

.field input:focus,
.field textarea:focus {
  border-color: var(--saffron);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(232,168,56,0.12);
}

.field input::placeholder,
.field textarea::placeholder {
  color: #aaa;
}

.field textarea {
  resize: vertical;
  min-height: 60px;
}

.search-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}

.btn-search {
  flex: 1;
  padding: 16px 32px;
  background: linear-gradient(135deg, var(--terracotta), #D4694A);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 16px rgba(199,91,57,0.3);
}

.btn-search:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(199,91,57,0.4);
}

.btn-search:active { transform: translateY(0); }

.btn-search:disabled {
  opacity: 0.7;
  cursor: wait;
  transform: none;
}

.btn-search .spinner {
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}

.btn-search.loading .spinner { display: block; }
.btn-search.loading .btn-text { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

.quick-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.quick-tags span {
  font-size: 12px;
  color: var(--text-light);
  font-weight: 600;
  margin-right: 4px;
}

.tag {
  padding: 5px 12px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.tag:hover {
  background: var(--saffron);
  color: var(--navy);
  border-color: var(--saffron);
}

/* --- RESULTS --- */
.results-section {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
  display: none;
}

.results-section.visible { display: block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-count {
  font-family: 'Libre Baskerville', serif;
  font-size: 22px;
  color: var(--navy);
}

.results-count span { color: var(--terracotta); }

.export-btns {
  display: flex;
  gap: 10px;
}

.btn-export {
  padding: 10px 20px;
  background: var(--navy);
  color: var(--cream);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-export:hover {
  background: var(--navy-light);
  transform: translateY(-1px);
}

.results-grid {
  display: grid;
  gap: 16px;
}

.shop-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.4s ease-out both;
}

.shop-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--saffron);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.shop-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 12px;
}

.shop-name {
  font-family: 'Libre Baskerville', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
}

.shop-badge {
  flex-shrink: 0;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-maps { background: #E8F5E9; color: #2E7D32; }
.badge-web { background: #E3F2FD; color: #1565C0; }
.badge-jd { background: #FFF3E0; color: #E65100; }

.shop-meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.meta-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.4;
}

.meta-row .icon {
  flex-shrink: 0;
  width: 18px;
  text-align: center;
  margin-top: 1px;
}

.meta-row a {
  color: var(--terracotta);
  text-decoration: none;
  font-weight: 500;
}

.meta-row a:hover { text-decoration: underline; }

.shop-rating {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--cream);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  margin-top: 8px;
}

.shop-rating .stars { color: var(--saffron); letter-spacing: 1px; }

.shop-area-tag {
  position: absolute;
  top: 0;
  right: 0;
  background: var(--navy);
  color: var(--saffron);
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  border-radius: 0 0 0 var(--radius-sm);
  letter-spacing: 0.5px;
}

/* --- EMPTY STATE --- */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 20px; color: var(--navy); margin-bottom: 8px; }
.empty-state p { color: var(--text-light); font-size: 15px; }

/* --- LOADING --- */
.loading-state {
  text-align: center;
  padding: 60px 20px;
  display: none;
}

.loading-state.visible { display: block; }

.loader-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}

.loader-dots span {
  width: 12px;
  height: 12px;
  background: var(--saffron);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite;
}

.loader-dots span:nth-child(2) { animation-delay: 0.16s; }
.loader-dots span:nth-child(3) { animation-delay: 0.32s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.loading-state p {
  font-size: 16px;
  color: var(--text-light);
}

/* --- FOOTER --- */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
  font-size: 13px;
  border-top: 1px solid var(--border);
  margin-top: 60px;
}

.footer a { color: var(--terracotta); text-decoration: none; }

/* --- ERROR TOAST --- */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--terracotta);
  color: white;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
}
.toast.visible { transform: translateY(0); opacity: 1; }

/* --- RESPONSIVE --- */
@media (max-width: 600px) {
  .header-inner { padding: 12px 16px; }
  .logo-text { font-size: 20px; }
  .hero { padding: 40px 16px 60px; }
  .search-card { padding: 24px 20px 20px; }
  .search-actions { flex-direction: column; }
  .btn-search { width: 100%; }
  .results-header { flex-direction: column; align-items: flex-start; }
  .shop-card { padding: 20px 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🏪</div>
      <div>
        <div class="logo-text">Dukaan<span>Khoj</span></div>
        <div class="logo-sub" data-i18n="tagline">Shop Finder for India</div>
      </div>
    </div>
    <div class="lang-toggle" onclick="toggleLang()">
      <button class="lang-btn active" id="lang-en">EN</button>
      <button class="lang-btn" id="lang-hi">हिं</button>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <h1 data-i18n="heroTitle">Find <em>every shop</em> in your area</h1>
    <p data-i18n="heroSub">Search across Google Maps, JustDial & IndiaMART in one click. Built for Indian MSME owners.</p>
  </div>
</section>

<!-- SEARCH -->
<section class="search-section">
  <div class="search-card">
    <form id="searchForm" onsubmit="handleSearch(event)">
      <div class="form-row">
        <div class="field">
          <label data-i18n="labelKeyword">🔍 What are you looking for? <span class="req">*</span></label>
          <input type="text" id="keywords" placeholder="e.g. CNC laser cutting, stainless steel gate..." data-i18n-placeholder="placeholderKeyword" required>
        </div>
        <div class="field">
          <label data-i18n="labelArea">📍 Area / City <span class="req">*</span></label>
          <input type="text" id="areas" placeholder="e.g. Fatehpur, Khaga, Kaushambi..." data-i18n-placeholder="placeholderArea" required>
        </div>
      </div>
      <div class="form-row">
        <div class="field full">
          <label data-i18n="labelComments">📝 Additional details (optional)</label>
          <textarea id="comments" rows="2" placeholder="e.g. stainless steel only, near bus stand, wholesale dealer..." data-i18n-placeholder="placeholderComments"></textarea>
        </div>
      </div>
      <div class="search-actions">
        <button type="submit" class="btn-search" id="searchBtn">
          <span class="btn-text" data-i18n="btnSearch">🔎 Search Shops</span>
          <span class="spinner"></span>
        </button>
      </div>
    </form>
    <div class="quick-tags">
      <span data-i18n="quickLabel">Quick:</span>
      <button class="tag" onclick="quickFill('CNC laser cutting','Fatehpur, Khaga')">CNC Laser Cutting</button>
      <button class="tag" onclick="quickFill('stainless steel gate railing','Fatehpur')">SS Gate & Railing</button>
      <button class="tag" onclick="quickFill('steel fabrication welding','Kaushambi')">Steel Fabrication</button>
      <button class="tag" onclick="quickFill('iron dealer','Khaga, Fatehpur')">Iron Dealer</button>
      <button class="tag" onclick="quickFill('aluminium works','Khaga')">Aluminium Works</button>
    </div>
  </div>
</section>

<!-- LOADING -->
<div class="loading-state" id="loadingState">
  <div class="loader-dots">
    <span></span><span></span><span></span>
  </div>
  <p data-i18n="searching">Searching Google Maps, JustDial, IndiaMART...</p>
</div>

<!-- RESULTS -->
<section class="results-section" id="resultsSection">
  <div class="results-header">
    <h2 class="results-count" data-i18n="resultsTitle">Found <span id="resultCount">0</span> shops</h2>
    <div class="export-btns">
      <button class="btn-export" onclick="exportCSV()">📥 <span data-i18n="exportCsv">Download CSV</span></button>
    </div>
  </div>
  <div class="results-grid" id="resultsGrid"></div>
</section>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer class="footer">
  <p data-i18n="footer">DukaanKhoj — Helping Indian businesses find suppliers & shops.</p>
</footer>

<script>
// ===== i18n =====
let currentLang = 'en';

const translations = {

    heroSub: 'Google Maps, JustDial और IndiaMART पर एक क्लिक में खोजें। भारतीय MSME मालिकों के लिए बनाया गया।',
    labelKeyword: '🔍 आप क्या खोज रहे हैं? <span class="req">*</span>',

    labelComments: '📝 अतिरिक्त विवरण (वैकल्पिक)',

    placeholderArea: 'जैसे: फतेहपुर, खागा, कौशाम्बी...',
    placeholderComments: 'जैसे: केवल स्टेनलेस स्टील, बस स्टैंड के पास, थोक विक्रेता...',
    btnSearch: '🔎 दुकान खोजें',
    quickLabel: 'जल्दी खोजें:',
    searching: 'Google Maps, JustDial, IndiaMART पर खोज रहे हैं...',
    resultsTitle: '<span id="resultCount">0</span> दुकानें मिलीं',
    exportCsv: 'CSV डाउनलोड करें',
    footer: 'दुकानखोज — भारतीय व्यवसायों को आपूर्तिकर्ता और दुकानें खोजने में मदद।',
    noResults: 'कोई दुकान नहीं मिली। अलग कीवर्ड या बड़ा क्षेत्र आज़माएं।',
    noResultsTitle: 'कोई परिणाम नहीं',
    errorMsg: 'कुछ गलत हो गया। कृपया पुनः प्रयास करें।',
  }
};

function toggleLang() {
  currentLang = currentLang === 'en' ? 'hi' : 'en';
  document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
  document.getElementById('lang-hi').classList.toggle('active', currentLang === 'hi');
  applyTranslations();
}

function applyTranslations() {
  const t = translations[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.innerHTML = t[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key]) el.placeholder = t[key];
  });
  if (lastResults.length > 0) {
    document.getElementById('resultCount').textContent = lastResults.length;
  }
}

// ===== SEARCH =====
let lastResults = [];

function quickFill(keywords, areas) {
  document.getElementById('keywords').value = keywords;
  document.getElementById('areas').value = areas;
  document.getElementById('keywords').focus();
}

async function handleSearch(e) {
  e.preventDefault();
  const keywords = document.getElementById('keywords').value.trim();
  const areas = document.getElementById('areas').value.trim();
  const comments = document.getElementById('comments').value.trim();

  if (!keywords || !areas) return;

  const btn = document.getElementById('searchBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('loadingState').classList.add('visible');
  document.getElementById('resultsSection').classList.remove('visible');

  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ keywords, areas, comments })
    });

    if (!resp.ok) {
      let errMsg = translations[currentLang].errorMsg;
      try {
        const err = await resp.json();
        errMsg = err.message || errMsg;
      } catch(e) {
        errMsg = `Server error (${resp.status}). Please try again.`;
      }
      throw new Error(errMsg);
    }

    const data = await resp.json();
    lastResults = data.results || [];
    renderResults(lastResults);
  } catch (err) {
    showToast(err.message || translations[currentLang].errorMsg);
    // Show empty results section so user sees something
    document.getElementById('resultsSection').classList.add('visible');
    document.getElementById('resultCount').textContent = '0';
    document.getElementById('resultsGrid').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>${err.message}</h3>
        <p>Please try again in a moment.</p>
      </div>`;
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    document.getElementById('loadingState').classList.remove('visible');
  }
}

function renderResults(results) {
  const section = document.getElementById('resultsSection');
  const grid = document.getElementById('resultsGrid');
  const count = document.getElementById('resultCount');

  section.classList.add('visible');
  count.textContent = results.length;

  if (results.length === 0) {
    const t = translations[currentLang];
    grid.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h3>${t.noResultsTitle}</h3>
        <p>${t.noResults}</p>
      </div>`;
    return;
  }

  grid.innerHTML = results.map((r, i) => {
    const stars = r.rating ? '★'.repeat(Math.round(r.rating)) + '☆'.repeat(5 - Math.round(r.rating)) : '';
    const badgeClass = r.source === 'Google Maps' ? 'badge-maps' : r.source === 'Web Search' ? 'badge-web' : 'badge-jd';
    return `
    <div class="shop-card" style="animation-delay:${i * 0.06}s">
      <div class="shop-area-tag">${r.area || ''}</div>
      <div class="shop-card-top">
        <div class="shop-name">${escapeHtml(r.name)}</div>
        <span class="shop-badge ${badgeClass}">${r.source}</span>
      </div>
      <div class="shop-meta">
        ${r.address ? `<div class="meta-row"><span class="icon">📍</span>${escapeHtml(r.address)}</div>` : ''}
        ${r.phone ? `<div class="meta-row"><span class="icon">📞</span><a href="tel:${r.phone}">${r.phone}</a></div>` : ''}
        ${r.website ? `<div class="meta-row"><span class="icon">🌐</span><a href="${r.website}" target="_blank" rel="noopener">${truncate(r.website,50)}</a></div>` : ''}
        ${r.hours ? `<div class="meta-row"><span class="icon">🕐</span>${truncate(escapeHtml(r.hours),80)}</div>` : ''}
        ${r.maps_link ? `<div class="meta-row"><span class="icon">🗺️</span><a href="${r.maps_link}" target="_blank" rel="noopener">Open in Google Maps</a></div>` : ''}
        ${r.description ? `<div class="meta-row"><span class="icon">📝</span>${truncate(escapeHtml(r.description),120)}</div>` : ''}
      </div>
      ${r.rating ? `<div class="shop-rating"><span class="stars">${stars}</span> ${r.rating} (${r.reviews || 0} reviews)</div>` : ''}
    </div>`;
  }).join('');

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function truncate(str, max) {
  if (!str) return '';
  return str.length > max ? str.slice(0, max) + '...' : str;
}

// ===== EXPORT =====
function exportCSV() {
  if (!lastResults.length) return;
  const headers = ['Shop Name','Address','Area','Phone','Website','Rating','Reviews','Status','Hours','Maps Link','Source'];
  const rows = lastResults.map(r => [
    r.name, r.address, r.area, r.phone, r.website,
    r.rating, r.reviews, r.status, r.hours, r.maps_link, r.source
  ]);
  let csv = '\uFEFF' + headers.join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dukaankhoj_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), 4000);
}
</script>
